# Kokoro TTS — Default Configuration\n# These values are used when no config.json exists yet.\n\n# Voice selection (single voice ID or comma-separated for blending)\nvoice: "af_nicole,bf_emma"\n\n# Speech rate: 0.5 (slow) to 3.0 (fast)\nspeed: 1.3\n\n# Language code: a=American English, b=British English, e=Spanish,\n# f=French, h=Hindi, i=Italian, j=Japanese, p=Brazilian Portuguese, z=Mandarin Chinese\nlang_code: "a"